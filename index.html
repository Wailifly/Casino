<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111;--sur:#1e1e1e;--sur2:#2a2a2a;--bor:#3a3a3a;--gold:#ffd700;--gold2:#c8a800;--nth:#7a6b8a;--nth2:#4a3e5a;--tx:#f0e8d0;--mu:#888;--gr:#4caf50;--re:#e53935}
#app{font-family:'VT323',monospace;background:var(--bg);color:var(--tx);min-height:800px;border:2px solid var(--bor);font-size:18px}
.hdr{background:var(--nth2);border-bottom:3px solid var(--gold);padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold)}
.nav button{font-family:'VT323',monospace;font-size:16px;padding:4px 11px;border:2px solid var(--bor);background:var(--sur);color:var(--mu);cursor:pointer}
.nav button.on{background:var(--gold2);color:#000;border-color:var(--gold)}
.wbar{background:var(--sur);border-bottom:2px solid var(--bor);padding:7px 16px;display:flex;gap:10px;align-items:center}
.badge{background:var(--nth2);border:2px solid var(--gold);padding:3px 9px;color:var(--gold);font-size:20px}
.btn{font-family:'VT323',monospace;font-size:18px;padding:5px 14px;background:var(--gold2);color:#000;border:2px solid var(--gold);cursor:pointer}
.btn.gr{background:var(--gr);color:#fff;border-color:#80e080}
.btn.re{background:var(--re);color:#fff;border-color:#ff8080}
.ga{background:var(--sur);border:2px solid var(--bor);padding:16px;margin-bottom:14px}
.res{border:2px solid var(--bor);padding:10px 14px;margin-top:10px;font-size:20px;text-align:center}
.res.win{border-color:var(--gr);color:var(--gr)}
.res.lose{border-color:var(--re);color:var(--re)}

/* Bugfix: Seiten standardmäßig verstecken, außer sie haben die Klasse .on */
.pg { display: none; }
.pg.on { display: block; }
</style>
