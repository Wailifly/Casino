<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Netherite Casino</title>
<style>
body { background:#111; color:#f0e8d0; font-family:monospace; margin:0; }
button { cursor:pointer; }
.badge { background:#2a2a2a; border:2px solid #ffd700; padding:4px 12px; color:#ffd700; font-size:20px; }
</style>

<!-- Firebase Realtime Database -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<div style="padding:10px; border-bottom:2px solid #333;">
  <b>⛏ Netherite Casino</b><br>
  Spieler: <input id="pname" oninput="updW()">
  <span class="badge">⬛ <span id="wdis">0</span> NC</span>
</div>

<button onclick="addAccount()">Account laden/erstellen</button>
<button onclick="coinFlip()">Coinflip (10 NC)</button>

<div id="out" style="margin:20px 0; font-size:24px; min-height:40px;"></div>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
  apiKey: "AIzaSyCgtgwVCGK5d02ARp8uU1Un6LLKt7GdXBg",
  authDomain: "minecraftcasino-a3716.firebaseapp.com",
  databaseURL: "https://minecraftcasino-a3716-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "minecraftcasino-a3716",
  storageBucket: "minecraftcasino-a3716.firebasestorage.app",
  messagingSenderId: "449691718779",
  appId: "1:449691718779:web:14fd2bc1c3e4c3c602bede"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ==================== BALANCE FUNKTIONEN (wie Gemini) ====================
async function getBal(name) {
  if (!name) return 0;
  const snapshot = await db.ref("players/" + name).once("value");
  return snapshot.exists() ? (snapshot.val().bal || 0) : 0;
}

async function setBal(name, value) {
  if (!name) return;
  const bal = Math.max(0, Math.round(value));
  await db.ref("players/" + name).set({ bal: bal });
  updW();
}

// ==================== UI ====================
function gp() {
  return document.getElementById("pname").value.trim();
}

async function updW() {
  const p = gp();
  document.getElementById("wdis").innerText = p ? await getBal(p) : 0;
}

async function addAccount() {
  const p = gp();
  if (!p) return alert("Bitte Namen eingeben!");
  
  const current = await getBal(p);
  if (current === 0) {
    await setBal(p, 100); // Startguthaben
  }
  alert("Account bereit!");
  updW();
}

// ==================== GAME ====================
async function coinFlip() {
  const p = gp();
  if (!p) return alert("Name fehlt!");

  const bet = 10;
  const bal = await getBal(p);

  if (bal < bet) {
    document.getElementById("out").innerHTML = "❌ Nicht genug Guthaben!";
    return;
  }

  const win = Math.random() > 0.5;

  if (win) {
    await setBal(p, bal + bet);
    document.getElementById("out").innerHTML = `<span style="color:#4caf50">GEWONNEN! +${bet} NC 🎉</span>`;
  } else {
    await setBal(p, bal - bet);
    document.getElementById("out").innerHTML = `<span style="color:#e53935">VERLOREN! -${bet} NC 😢</span>`;
  }
}

// ==================== INIT ====================
document.addEventListener("DOMContentLoaded", () => {
  console.log("%c[Realtime Database] Netherite Casino gestartet", "color:#ffd700");
  updW();
});
</script>
</body>
</html>
